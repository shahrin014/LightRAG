services:
  nginx:
    image: nginx:alpine
    entrypoint: sh
    command:
      - -c
      - |
        echo 'server {
            listen 9620;
            access_log /dev/stdout;
            error_log /dev/stderr;

            location /test-webui/ {
                proxy_pass http://lightrag:9621/test-webui/;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
            }

            location /test-api/ {
                rewrite ^/test-api(/.*)$$ $$1 break;
                proxy_pass http://lightrag:9621;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_set_header X-Script-Name /test-api;
            }

            location / {
                return 302 /test-webui/;
            }
        }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
    ports:
      - "9620:9620"
    depends_on:
      - lightrag

  lightrag:
    image: lightrag:nginx
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_WEBUI_PREFIX: /test-webui/
        VITE_API_PREFIX: /test-api
    ports:
      - "9621:9621"
    volumes:
      - ./data/rag_storage:/tmp/rag_storage
      - ./data/inputs:/tmp/inputs
      - ./.env:/app/.env
    environment:
      WORKING_DIR: "/tmp/rag_storage"
      INPUT_DIR: "/tmp/inputs"
      HOST: "0.0.0.0"
      PORT: "9621"
      LIGHTRAG_API_PREFIX: "/test-api"
      LIGHTRAG_WEBUI_PATH: "/test-webui"
    extra_hosts:
      - "host.docker.internal:host-gateway"
